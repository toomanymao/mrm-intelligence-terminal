<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mr. M Podcast</title>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & MOBILE SCROLL FIX --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 
           Crucial Fix: Changed 'overflow: hidden' to 'auto' 
           and 'height' to 'min-height' so it scrolls on phones.
        */
        body, html {
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            background: url('images/background.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed; /* Keep background static while scrolling */
            background-color: #0f0f13; 
            color: white;
            overflow-x: hidden; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }

        /* Dark overlay - must be fixed to stay during scroll */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        /* Global cursor fix */
        a, button, .cta-button {
            cursor: pointer !important;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HERO SECTION --- */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px 40px 20px; /* Space for nav at top */
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem 2rem;
            max-width: 750px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
        }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 2.2rem;
            line-height: 1.3;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
        }

        .cta-button {
            display: inline-block;
            background-color: #f7931a; /* Bitcoin Orange */
            color: #000;
            text-decoration: none;
            padding: 16px 36px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        /* --- MEDIA QUERY FOR SMALL PHONES --- */
        @media (max-width: 480px) {
            .glass-box {
                padding: 1.5rem 1rem;
            }
            .glass-box h1 {
                font-size: 1.6rem;
            }
            .hero {
                padding-top: 100px;
            }
            .cta-button {
                width: 100%; /* Full width button on very small screens */
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="container">
        <main class="hero">
            <div class="glass-box">
                <h1>Hosting deep conversations with the incredible and inspiring minds shaping the world of Bitcoin.</h1>
            </div>
            <a href="http://www.youtube.com/@MrMPodcast" target="_blank" rel="noopener noreferrer" class="cta-button">
                Watch on YouTube
            </a>
        </main>
    </div>

    <script>
        // Load external navigation
        fetch('navigation.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                const homeLink = document.getElementById('nav-link-home');
                if(homeLink) homeLink.classList.add('active');
            })
            .catch(err => console.error('Nav Load Error:', err));
    </script>

</body>
</html>
