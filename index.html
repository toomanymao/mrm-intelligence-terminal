<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. M Podcast</title>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Roboto:wght@300;400;700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CURSOR OVERRIDE */
        a, a *, button, .cta-button {
            cursor: pointer !important;
        }

        body, html {
            /* 
               dvh (Dynamic Viewport Height) is the fix for iPhone. 
               It accounts for the browser's address/nav bars dynamically.
            */
            min-height: 100dvh; 
            font-family: 'Roboto', sans-serif;
            background: url('images/background.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            background-color: #0f0f13; 
            color: white;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Smoother scrolling for iOS */
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* --- HERO SECTION --- */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Vertical center */
            align-items: center;     /* Horizontal center */
            text-align: center;
            padding: 2rem 1.5rem;   /* Padding to prevent edge-touching */
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2.5rem 4rem;
            max-width: 750px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .glass-box h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 2.5rem;
            line-height: 1.4;
            margin: 0;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
        }

        .cta-button {
            display: inline-block;
            background-color: #f7931a; 
            color: #000;
            text-decoration: none;
            padding: 16px 36px; /* Slightly larger hit area for mobile thumbs */
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 4px;
            transition: transform 0.2s ease, background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .cta-button:hover {
            background-color: #e5930e;
            transform: translateY(-2px);
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .hero {
                /* Ensures content isn't buried under Safari's bottom bar */
                padding-bottom: 100px; 
                justify-content: center; 
            }
            .glass-box {
                padding: 1.5rem;
                margin-top: 1rem;
                width: 90%;
            }
            .glass-box h1 {
                font-size: 1.5rem;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <div class="container">
        <main class="hero">
            <div class="glass-box">
                <h1>Hosting deep conversations with the incredible and inspiring minds shaping the world of Bitcoin.</h1>
            </div>
            <!-- The link is pulled from your established YouTube channel: https://www.youtube.com/@MrMPodcast/ -->
            <a href="http://www.youtube.com/@MrMPodcast" target="_blank" rel="noopener noreferrer" class="cta-button">Watch on YouTube</a>
        </main>
    </div>

    <script>
        fetch('navigation.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                const homeLink = document.getElementById('nav-link-home');
                if(homeLink) homeLink.classList.add('active');
            })
            .catch(err => console.error('Error loading navigation:', err));
    </script>

</body>
</html>
